<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
  
    <!-- Encoding + mobile responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page info -->
    <title>4th Quarter Portfolio - Tomas Macalintal</title>
    <meta name="description" content="My 4th and last portfolio for the school year.">
    <meta name="author" content="Datu Macalintal">
  
  <title>Tomas' 4TH QUARTER Portfolio</title>
  <style>
    body{
      font-family: 'Ubuntu', sans-serif;
      background-color: rgb(119, 233, 223);
      overflow: hidden;
    }
    h1{
      font-size: 2em;
      font-weight: bold;
      color: rgb(76, 245, 236);
      text-shadow: 0 0 10px rgb(29, 97, 95);
      margin-bottom: 150px;
    }
    nav ul{
      list-style: none;
    }
    a{
      display: block;
      text-align: center;
      border: 2px solid rgb(92, 244, 255);
      background-color: rgb(36, 192, 192);
      width: 30%;
      height: max-content;
      line-height: 120px;
      transition: 0.3s ease-in-out;
      color: rgb(0, 255, 242);
      text-shadow: 0 0 2px rgb(171, 242, 255);
      text-decoration: none;
      border-radius: 10px;
    }
    a:hover{
      color: rgb(33, 85, 87);
      text-shadow: 0 0 50px white;
      transition: 0.3s ease-in-out;
      border-color: rgb(33, 85, 87);
      background-color: rgb(83, 236, 229);
      transform: scale(110%);
    }
    .me{
        position: absolute;
        width: 60%;
        height: 100%;
        top: 0;
        right: -100%;
        animation: slidein 0.6s ease forwards;
        background: url('https://raw.githubusercontent.com/tomasdmacalintal/CS3_4thQtrPortfolio/main/assets/images/me_1.png');
        background-repeat: no-repeat;
        background-position: 60% -50%;
        transform: scaleX(-1);
    }
    @keyframes slidein {
        0% {right: -100%;}
        100% {right: 0;}
    }
    @keyframes slideout {
        0% {right: 0;}
        100% {right: 200%;}
    }

  </style>
</head>
<body>
  <section class="w3-container">
   <h1>Links to Tomas' 4TH QUARTER work</h1>
   <nav>
    <ul>
      <li><a href="./public/quarter 4/q41gPotassiumMACALINTAL.html" class="link"> Q4 First and Second Graded Exercise </a></li>
      <li><a href="./public/quarter 4/3rdGraded/index.html" class="link"> Q4 Third Graded Exercise </a></li>
    </ul>
   </nav>
  </section>

  <script>
    const links = document.getElementsByClassName('link');
    for (let i = 0; i < links.length; i++){
        links[i].addEventListener('mouseenter', (event) => {
            createMe(i);
        });
        links[i].addEventListener('mouseleave', (event) => {
            removeMe(i);
        });
    }
    function createMe(i){
        if (document.getElementById('me-'+i)) return;

        me = document.createElement('div');
        me.className = 'me';
        me.id = 'me-'+i;
        document.body.appendChild(me);
    }
    function removeMe(i){
        const me = document.getElementById('me-' + i);
        if (!me) return;

        const animation = me.animate([
                {right: 0},
                {right: '200%'}
            ],
            {
                duration: 600,
                easing: 'ease',
                fill: 'forwards'
            }    
        );
        animation.onfinish = () => {
            me.remove();
        };
    }
  </script>
</body>
</html>
