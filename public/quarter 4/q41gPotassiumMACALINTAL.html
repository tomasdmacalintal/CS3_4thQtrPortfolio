<!DOCTYPE html>
<html lang="en">
<head>
    <!-- favicon -->

    <!-- Encoding + mobile responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page info -->
    <title>Movie Rater</title>
    <meta name="description" content="First and second graded output for CS quarter 4.">
    <meta name="author" content="Datu Macalintal">

    <!-- Link Stylesheet -->


    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #bg{
            width: 100vw;
            height: 100vh;
            background: radial-gradient(at center, #050812, #111a3a, #1f4e8c);
            animation: pulse 6s ease infinite alternate;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        h1, h2 {
            text-align: center;
            color: white;
            animation:  slidedown 1.5s ease,
                        shinetext 6s ease infinite alternate;
            user-select: none;
        }
        h1{
            font-size: 3em;
            margin-bottom: 7px;
        }
        h2{
            margin: 1px;
            font-style: italic;
        }
        .moving-element{
            position: relative;
            width: 400px;
            height: max-content;
            justify-self: center;
        }
        #left-pattern{
            position: absolute;
            height: 100vh;
            width: 50%;
            opacity: 50%;
            top: 0;
            left: 0;
            animation: scrollup 8s linear infinite;
            background-image: url('https://raw.githubusercontent.com/tomasdmacalintal/CS3_4thQtrPortfolio/main/assets/images/pattern.png');
            background-repeat: repeat-y;
            background-position: 50% 0;
            user-select: none;
        }
        #right-pattern{
            position: absolute;
            height: 100vh;
            width: 50%;
            opacity: 50%;
            top: 0;
            right: 0;
            animation: scrolldown 8s linear infinite;
            background-image: url('https://raw.githubusercontent.com/tomasdmacalintal/CS3_4thQtrPortfolio/main/assets/images/pattern.png');
            background-repeat: repeat-y;
            background-position: 50% 0;
            user-select: none;
        }
        form{
            background-color: transparent;
            width: 500px;
            justify-self: center;
            padding: 30px;
            margin: 50px;
            border: 2px solid white;
            animation:  slideup 2s ease,
                        shinebox 6s ease infinite alternate;
            border-radius: 20px;
        }
        label{
            animation: shinetext 6s ease infinite alternate;
            color: white;
            user-select: none;

        }
        input, select{
            margin-bottom: 20px;
            background-color: transparent;
            border: 2px solid rgb(30, 101, 119);
            border-radius: 5px;
            color: rgb(56, 181, 212);
            appearance: none;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
        }
        select option {
            background-color: rgb(141, 230, 252);
            color: rgb(30, 101, 119);
        }
        input:hover, select:hover, input:focus, select:focus{
            border: 2px solid rgb(34, 177, 212);
            color: rgb(156, 235, 255);
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        select{
            width: 110px;
            height: 20px;
            background: url('https://raw.githubusercontent.com/tomasdmacalintal/CS3_4thQtrPortfolio/main/assets/images/select.png');
            background-position: -2px -1px;
        }
        select:hover{
            background: url('https://raw.githubusercontent.com/tomasdmacalintal/CS3_4thQtrPortfolio/main/assets/images/select_hovered.png');
            background-position: -2px -1px;
        }
        .shortanswer{
            border: none;
            border-bottom: 2px solid rgb(30, 101, 119);
        }
        .shortanswer:hover, .shortanswer:focus{
            border: none;
            border-bottom: 2px solid rgb(34, 177, 212);
        }

        @keyframes slidedown {
            0% {transform: translateY(-400%);}
            100% {transform: translateY(0);}
        }
        @keyframes slideup {
            0% {transform: translateY(400%);}
            100% {transform: translateY(0);}
        }
        @keyframes scrollup {
            0% {background-position-y: 0;}
            100% {background-position-y: -1773px;}
        }
        @keyframes scrolldown {
            0% {background-position-y: 0; transform: scaleX(-1);}
            100% {background-position-y: 1773px; transform: scaleX(-1);}
        }
        @keyframes pulse {
            0% {background-size: 800% 800%; background-position: center center;}
            100% {background-size: 150% 150%; background-position: center center;}
        }
        @keyframes shinetext {
            0% {text-shadow: 0px 0px 10px rgb(51, 198, 235),
            0px 0px 10px rgba(51, 198, 235),
            0px 0px 10px rgba(51, 198, 235);}

            100% {text-shadow: 0px 0px 10px rgb(51, 198, 235),
            0px 0px 10px rgba(51, 198, 235),
            0px 0px 10px rgba(51, 198, 235),
            0px -20px 20px rgba(255, 255, 255, 0.2),
            0px 20px 20px rgba(255, 255, 255,0.2);}
        }
        @keyframes shinebox {
            0% {box-shadow: 0px 0px 10px rgb(51, 198, 235),
            0px 0px 10px rgba(51, 198, 235),
            0px 0px 10px rgba(51, 198, 235);}

            100% {box-shadow: 0px 0px 10px rgb(51, 198, 235),
            0px 0px 10px rgba(51, 198, 235),
            0px 0px 10px rgba(51, 198, 235),
            0px -20px 20px rgba(255, 255, 255, 0.2),
            0px 20px 20px rgba(255, 255, 255,0.2);}
        }
        
    </style>
</head>
<body>
    <div id="bg">
        <div id="left-pattern"></div>
        <div id="right-pattern"></div>
    </div>
    <h1 class="moving-element">MOVIE RATER</h1>
    <h2 class="moving-element">"Good or not, your rating still matters."</h2>
    <form class="moving-element" id="form" onsubmit="submitForm(event)">
        <div class="field">
            <label class="label">Title:</label>
            <div class="control">
                <input type="text" name="q1" class="shortanswer" onblur="handleBlur(event)" autocomplete="off" required>
            </div>
        </div>
        
        <div class="field">
            <label class="label">Year:</label>
            <div class="control">
                <input type="number" name="q2" class="shortanswer" onblur="handleBlur(event)" min="0" autocomplete="off" required>
            </div>
        </div>


        <div class="field">
            <label class="label">Genre:</label>
            <div class="control">
                <select name="q6" onblur="handleBlur(event)" required>
                    <option name="q6" value="" disabled selected hidden>Choose..</option>
                    <option name="q6" value="1">Action</option>
                    <option name="q6" value="2">Comedy</option>
                    <option name="q6" value="3">Horror</option>
                    <option name="q6" value="4">Drama</option>
                    <option name="q6" value="5">Sci-fi</option>
                    <option name="q6" value="6">Romance</option>
                    <option name="q6" value="7">Thriller</option>
                    <option name="q6" value="8">Fantasy</option>
                    <option name="q6" value="9">Documentary</option>
                    <option name="q6" value="10">Historical</option>
                </select>
            </div>
        </div>

        <div class="line">
            <input type="submit">
            <input type="reset">
        </div>
        
    </form>

    <script>
        const form = document.getElementById('form');
        const movingElement = document.getElementsByClassName('moving-element');
        form.addEventListener('animationend', (event) => {
            document.body.style.overflow = "visible";
        })
        document.addEventListener('mousemove', (event) => {

            const mouseX = event.clientX;
            const mouseY = event.clientY;
            const width = window.innerWidth;
            const height = window.innerHeight;

            for (let i=0; i<movingElement.length; i++){
                movingElement[i].style.left = `${-mouseX/60 + width/120}px`;
                movingElement[i].style.top = `${-mouseY/60 + height/120}px`;
            }
        });
    </script>
</body>
