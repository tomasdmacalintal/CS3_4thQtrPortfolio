<!DOCTYPE html>
<html lang="en">
<head>
    <!-- favicon -->

    <!-- Encoding + mobile responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page info -->
    <title>Movie Rater</title>
    <meta name="description" content="First and second graded output for CS quarter 4.">
    <meta name="author" content="Datu Macalintal">

    <!-- Link Stylesheet -->


    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            background: radial-gradient(at center, #050812, #111a3a, #1f4e8c);
            animation: pulse 6s ease infinite alternate;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            color: white;
            text-shadow: 0px 0px 10px rgb(51, 198, 235),
            0px 0px 10px rgba(51, 198, 235),
            0px 0px 10px rgba(51, 198, 235),
            0px -20px 20px rgba(255, 255, 255, 0.2),
            0px 20px 20px rgba(255, 255, 255,0.2);
            font-size: 3em;
            user-select: none;
        }
        #moving-text{
            position: relative;
            width: 400px;
            height: max-content;
            justify-self: center;
        }
        #left-pattern{
            position: absolute;
            height: 100vh;
            width: 100%;
            opacity: 50%;
            top: 0;
            left: 0;
            animation: scrollup 5s linear infinite;
            overflow: hidden;
            background-image: url('https://raw.githubusercontent.com/tomasdmacalintal/CS3_4thQtrPortfolio/main/assets/images/pattern.png');
            background-repeat: repeat-y;
            background-position: center top;
        }
        #right-pattern{
            position: absolute;
            height: 100vh;
            width: 100%;
            opacity: 50%;
            top: 0;
            right: 0;
            animation: scrolldown 5s linear infinite;
            overflow: hidden;
            background-image: url('https://raw.githubusercontent.com/tomasdmacalintal/CS3_4thQtrPortfolio/main/assets/images/pattern.png');
            background-repeat: repeat-y;
            background-position: 0 0;
        }
        @keyframes scrollup {
            0% {background-position: 50% 0;}
            100% {background-position: 50% -1773px;}
        }
        @keyframes scrolldown {
            0% {background-position: 50% 0; transform: scaleX(-1);}
            100% {background-position: 50% 1773px; transform: scaleX(-1);}
        }
        @keyframes pulse{
            0% {background-size: 800% 800%; background-position: center center;}
            100% {background-size: 150% 150%; background-position: center center;}
        }
        
    </style>
</head>
<body>
    <div id="moving-text">
        <h1>MOVIE RATER</h1>
    </div>
    <div id="left-pattern"></div>
    <div id="right-pattern"></div>
    <script>
        const movingText = document.getElementById('moving-text');
        window.addEventListener('mousemove', (event) => {

            const mouseX = event.clientX;
            const mouseY = event.clientY;
            const width = window.innerWidth;
            const height = window.innerHeight;

            movingText.style.left = `${-mouseX/60 + width/120}px`;
            movingText.style.top = `${-mouseY/60 + height/120 + 50}px`;
        });
    </script>
</body>
